version: 2
updates:
  # 1. Update Node.js dependencies (supports pnpm-lock.yaml under the npm ecosystem)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore(deps)
    groups:
      # Group React core packages together
      react-core:
        patterns:
          - react
          - react-dom
      # Group typescript type packages
      typescript-types:
        patterns:
          - '@types/*'
      # Group minor and patch updates for all other packages
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  # 2. Update GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(ci)
